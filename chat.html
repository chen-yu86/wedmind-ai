<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>專業婚禮流程管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(to bottom, #fff0f5, #ffe4ec);
    padding: 20px;
}

h1 {
    text-align: center;
    color: #d63384;
}

.tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.tab {
    padding: 8px 16px;
    margin: 5px;
    cursor: pointer;
    background: #ffb6c1;
    border-radius: 6px;
    color: white;
}

.tab.active {
    background: #ff69b4;
}

.section {
    display: none;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.section.active {
    display: block;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #f8c8dc;
    padding: 8px;
}

th {
    background: #ffb6c1;
    color: white;
}

td[contenteditable] {
    outline: none;
}

button {
    margin: 5px;
    padding: 6px 12px;
    border: none;
    background: #ff69b4;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>💍 專業婚禮流程管理系統</h1>

<div class="tabs">
    <div class="tab active" onclick="switchTab('ceremony')">儀式</div>
    <div class="tab" onclick="switchTab('banquet')">宴客</div>
    <div class="tab" onclick="switchTab('music')">音樂建議</div>
    <div class="tab" onclick="switchTab('budget')">預算規劃</div>
</div>

<div id="ceremony" class="section active">
    <h3>儀式流程</h3>
    <table><tbody id="ceremonyTable"></tbody></table>
    <button onclick="addRow('ceremonyTable')">新增流程</button>
</div>

<div id="banquet" class="section">
    <h3>宴客流程</h3>
    <input type="time" id="startTime">
    <button onclick="autoGenerate()">自動產生完整時間軸</button>
    <table><tbody id="banquetTable"></tbody></table>
    <button onclick="addRow('banquetTable')">新增流程</button>
</div>

<div id="music" class="section">
    <h3>音樂建議</h3>
    <table><tbody id="musicTable"></tbody></table>
    <button onclick="addRow('musicTable')">新增音樂</button>
</div>

<div id="budget" class="section">
    <h3>預算規劃</h3>
    <table><tbody id="budgetTable"></tbody></table>
    <button onclick="addRow('budgetTable')">新增項目</button>
</div>

<button onclick="downloadPDF()">下載完整婚禮規劃PDF</button>

<script>

function switchTab(id) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

function addRow(tableId, time="請輸入時間", content="請輸入內容") {
    const table = document.getElementById(tableId);
    const row = document.createElement('tr');
    row.innerHTML = `
        <td contenteditable="true">${time}</td>
        <td contenteditable="true">${content}</td>
    `;
    table.appendChild(row);
    new Sortable(table, {animation:150});
}

function autoGenerate() {
    const start = document.getElementById("startTime").value;
    if(!start) return alert("請選擇開席時間");

    const table = document.getElementById("banquetTable");
    table.innerHTML = "";

    const timeline = [
        ["迎賓", 0],
        ["新人進場", 10],
        ["第一次進場", 20],
        ["用餐時間", 30],
        ["二次進場", 60],
        ["敬酒", 80],
        ["送客", 110]
    ];

    const [h, m] = start.split(":").map(Number);

    timeline.forEach(item=>{
        let totalMin = h*60 + m + item[1];
        let newH = Math.floor(totalMin/60);
        let newM = totalMin%60;
        let timeStr = String(newH).padStart(2,'0')+":"+String(newM).padStart(2,'0');
        addRow("banquetTable", timeStr, item[0]);
    });
}

function collectData(tableId) {
    const rows = [];
    const table = document.getElementById(tableId);
    for(let row of table.rows){
        rows.push({
            user: row.cells[0].textContent,
            assistant: row.cells[1].textContent
        });
    }
    return rows;
}

function downloadPDF(){
    fetch('http://127.0.0.1:8000/download_pdf',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            ceremony: collectData("ceremonyTable"),
            banquet: collectData("banquetTable"),
            music: collectData("musicTable"),
            budget: collectData("budgetTable")
        })
    })
    .then(resp=>resp.blob())
    .then(blob=>{
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href=url;
        a.download="wedding_master_plan.pdf";
        a.click();
    });
}

</script>

</body>
</html>
