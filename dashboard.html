<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>WedMind AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
}

.sidebar {
    width: 220px;
    background: linear-gradient(180deg,#1e293b,#0f172a);
    padding: 20px;
    height: 100vh;
}

.sidebar h2 {
    color: #7c3aed;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: transparent;
    border: 1px solid #7c3aed;
    color: white;
    cursor: pointer;
}

.main {
    flex: 1;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

input {
    padding: 8px;
    width: 70%;
    background: #1e293b;
    border: none;
    color: white;
}

button.send {
    background: linear-gradient(90deg,#7c3aed,#ec4899);
    border: none;
    padding: 8px 14px;
    color: white;
    cursor: pointer;
}

.chat-box {
    max-height: 200px;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="card">
<h3>⚡ AI 一鍵生成完整婚禮</h3>
<input id="style" placeholder="婚禮形式">
<input id="guests" placeholder="賓客人數">
<input id="budget" placeholder="總預算">
<input id="start" type="time">
<button class="send" onclick="smartGenerate()">生成</button>
<div id="smartResult"></div>
</div>

<div class="sidebar">
    <h2>WedMind AI</h2>
    <button>婚禮儀式</button>
    <button>宴客流程</button>
    <button>預算分析</button>
    <button>音樂規劃</button>
</div>

<div class="main">

    <div class="card">
        <h3>🤖 AI 婚禮顧問</h3>
        <div class="chat-box" id="chatBox"></div>
        <input id="messageInput" placeholder="輸入需求，例如：戶外婚禮流程">
        <button class="send" onclick="sendMessage()">送出</button>
    </div>

    <div class="card">
        <h3>📊 預算分析</h3>
        <canvas id="budgetChart"></canvas>
    </div>

</div>

<script>

async function sendMessage(){
    const input = document.getElementById("messageInput");
    const msg = input.value.trim();
    if(!msg) return;
    input.value="";

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += "<p><b>你：</b>"+msg+"</p>";

    const res = await fetch("http://127.0.0.1:8000/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    });

    const data = await res.json();
    chatBox.innerHTML += "<p style='color:#ec4899'><b>AI：</b>"+data.reply+"</p>";
}

const ctx = document.getElementById('budgetChart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['場地','婚攝','婚紗','佈置'],
        datasets: [{
            data: [50000,30000,20000,15000]
        }]
    }
});
async function smartGenerate(){
    const res = await fetch("http://127.0.0.1:8000/smart_generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            style:document.getElementById("style").value,
            guests:parseInt(document.getElementById("guests").value),
            budget:parseInt(document.getElementById("budget").value),
            start_time:document.getElementById("start").value
        })
    });

    const data = await res.json();
    document.getElementById("smartResult").innerText = data.result;
}
</script>

</body>
</html>
