<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>WedMind AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e1e2f, #0f0f1a);
    color: white;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    font-size: 40px;
    background: linear-gradient(90deg,#9f5afd,#4cc9f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    margin-top: 30px;
    box-shadow: 0 0 20px rgba(159,90,253,0.3);
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

input {
    background: rgba(255,255,255,0.1);
    color: white;
}

button {
    background: linear-gradient(90deg,#9f5afd,#4cc9f0);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#chatBox {
    margin-top: 20px;
}

.message {
    padding: 10px 15px;
    margin: 10px 0;
    border-radius: 15px;
    max-width: 80%;
}

.user {
    background: #4cc9f0;
    align-self: flex-end;
}

.ai {
    background: #9f5afd;
}
</style>
</head>

<body>

<div class="container">
    <h1>💍 WedMind AI</h1>

    <div class="card">
        <h3>🤖 AI 婚禮顧問</h3>
        <input id="messageInput" placeholder="輸入你想詢問的婚禮問題..." />
        <button onclick="sendMessage()">送出</button>
        <div id="chatBox"></div>
    </div>
</div>

<script>
async function sendMessage() {
    const message = document.getElementById("messageInput").value;

    const chatBox = document.getElementById("chatBox");

    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    const data = await response.json();

    const aiMsg = document.createElement("div");
    aiMsg.className = "message ai";
    aiMsg.innerText = data.reply;
    chatBox.appendChild(aiMsg);
}
</script>

</body>
</html>
