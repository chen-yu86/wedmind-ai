<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>WedMind AI 婚禮規劃</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- 圓餅圖 + 條形圖 -->
<style>
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f8cdda, #1d2671); color:#333; padding:20px; }
.container { max-width: 700px; margin:auto; background: rgba(255,255,255,0.95); padding:20px; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.2); }
h2 { text-align:center; color:#1d2671; }
input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
button { background:#1d2671; color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { background:#f8cdda; color:#1d2671; }
#chatBox { margin-top:15px; max-height:200px; overflow-y:auto; padding:10px; background:#f1f1f1; border-radius:10px; }
.message { padding:10px; margin:5px 0; border-radius:12px; max-width:80%; }
.user { background:#cce5ff; text-align:right; margin-left:20%; }
.ai { background:#e2e2ff; text-align:left; margin-right:20%; }
.input-group { display:flex; gap:5px; margin-top:10px; }
.input-group input { flex:1; }
.input-group button { flex:0.5; }
#budgetChart, #timelineChart { margin-top:20px; }
</style>
</head>
<body>

<div class="container">
<h2>WedMind AI 婚禮規劃 🤵👰</h2>

<select id="styleSelect">
  <option value="西式">西式</option>
  <option value="中式">中式</option>
</select>
<input type="number" id="guestInput" placeholder="賓客人數" value="100">
<input type="number" id="budgetInput" placeholder="婚禮總預算" value="100000">

<div class="input-group">
  <input id="messageInput" placeholder="輸入你的問題...">
  <button onclick="sendMessage()">送出</button>
</div>
<div class="input-group">
  <button onclick="generateFlow()">生成流程表</button>
  <button onclick="downloadPDF()">下載 PDF</button>
</div>

<div id="chatBox"></div>

<canvas id="budgetChart" width="400" height="400"></canvas>
<canvas id="timelineChart" width="600" height="300"></canvas>

</div>

<script>
let chartBudget = null;
let chartTimeline = null;

// 送出聊天訊息
async function sendMessage(){
    const msg = document.getElementById("messageInput").value;
    if(!msg) return;
    const chatBox = document.getElementById("chatBox");

    const userMsg = document.createElement("div");
    userMsg.className="message user";
    userMsg.innerText=msg;
    chatBox.appendChild(userMsg);
    document.getElementById("messageInput").value="";

    const response = await fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            message: msg,
            guests: parseInt(document.getElementById("guestInput").value),
            budget: parseInt(document.getElementById("budgetInput").value),
            style: document.getElementById("styleSelect").value
        })
    });

    const data = await response.json();
    const aiMsg = document.createElement("div");
    aiMsg.className="message ai";
    aiMsg.innerText=data.reply;
    chatBox.appendChild(aiMsg);
    chatBox.scrollTop = chatBox.scrollHeight;

    // 更新圖表
    if(msg.includes("預算") || msg.includes("budget")){
        updateBudgetChart(parseInt(document.getElementById("budgetInput").value));
    }
    if(msg.includes("流程") || msg.includes("flow")){
        updateTimelineChart();
    }
}

// 生成流程表
async function sendMessage(){
    const msg = document.getElementById("messageInput").value;
    if(!msg) return;
    const chatBox = document.getElementById("chatBox");

    const userMsg = document.createElement("div");
    userMsg.className="message user";
    userMsg.innerText=msg;
    chatBox.appendChild(userMsg);
    document.getElementById("messageInput").value="";

    const response = await fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            message: msg,
            guests: parseInt(document.getElementById("guestInput").value),
            budget: parseInt(document.getElementById("budgetInput").value),
            style: document.getElementById("styleSelect").value
        })
    });

    const data = await response.json();

    const aiMsg = document.createElement("div");
    aiMsg.className="message ai";
    aiMsg.innerText=data.reply;
    chatBox.appendChild(aiMsg);
    chatBox.scrollTop = chatBox.scrollHeight;

    // 如果回傳 timeline 自動更新圖表
    if(data.timeline) updateTimelineChart(data.timeline);

    // 如果回傳預算，自動更新圖表
    if(data.budget) updateBudgetChart(document.getElementById("budgetInput").value);
}

// 流程時間軸 + tooltip
function updateTimelineChart(timelineData){
    const labels = timelineData.map(item => item.step);
    const durations = timelineData.map(item => item.duration);
    const suggestions = timelineData.map(item => item.suggestion || "建議: 按標準流程安排");

    const ctx = document.getElementById('timelineChart').getContext('2d');
    if(chartTimeline) chartTimeline.destroy();

    chartTimeline = new Chart(ctx,{
        type:'bar',
        data:{
            labels: labels,
            datasets:[{
                label:'時間(小時)',
                data:durations,
                backgroundColor:['#1d2671','#FF6384','#36A2EB','#FFCE56']
            }]
        },
        options:{
            indexAxis:'y',
            responsive:true,
            plugins:{
                legend:{display:false},
                tooltip:{
                    callbacks:{
                        label: function(context){
                            const idx = context.dataIndex;
                            return `時間: ${durations[idx]} 小時 | ${suggestions[idx]}`;
                        }
                    }
                }
            },
            scales:{
                x:{beginAtZero:true,title:{display:true,text:'小時'}},
                y:{title:{display:true,text:'流程'}}
            }
        }
    });
}
</script>
</body>
</html>
