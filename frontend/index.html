<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>WedMind AI 婚禮規劃助理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right,#fff0f5,#ffe4ec);
    margin:0;
}
header{
    background:#ff69b4;
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
}
#chatBox{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
button{
    background:#ff69b4;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    margin:5px;
    cursor:pointer;
}
button:hover{background:#ff1493;}
.timeline-step{
    padding:8px;
    margin:5px 0;
    color:white;
    border-radius:5px;
}
.timeline-step:nth-child(1){background:#ff7f50;}
.timeline-step:nth-child(2){background:#ff6347;}
.timeline-step:nth-child(3){background:#ff1493;}
.timeline-step:nth-child(4){background:#db7093;}
</style>
</head>
<body>

<header>💍 WedMind AI 婚禮規劃助理</header>

<div id="chatBox">
    <div id="messages"></div>

    <input type="text" id="userInput" placeholder="輸入 流程 或 預算">
    <button onclick="sendMessage()">送出</button>
    <button onclick="generateTimeline()">婚禮流程</button>
    <button onclick="generateBudget()">婚禮預算</button>
    <button onclick="saveData()">儲存紀錄</button>
    <button onclick="loadData()">我的紀錄</button>

    <canvas id="barChart"></canvas>
    <canvas id="pieChart"></canvas>
</div>

<script>
const API_URL = "";
const username = "testUser";
const messagesDiv = document.getElementById("messages");
let barChart=null;
let pieChart=null;

function appendMessage(text){
    const div=document.createElement("div");
    div.innerHTML=text;
    messagesDiv.appendChild(div);
}

async function sendMessage(){
    const msg=document.getElementById("userInput").value;
    const res=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg})});
    const data=await res.json();

    appendMessage("<b>"+data.reply+"</b>");

    if(data.timeline){
        data.timeline.forEach(step=>{
            appendMessage(`<div class="timeline-step">${step.step} (${step.duration}hr) - ${step.suggestion}</div>`);
        });
    }

if(data.budget){

    const labels = Object.keys(data.budget);
    const values = Object.values(data.budget);

    const total = values.reduce((a,b)=>a+b,0);

    // 顯示總預算
    appendMessage(`<h3 style="color:#ff1493">
        💰 婚禮總預算：NT$ ${total.toLocaleString()}
    </h3>`);

    // 銷毀舊圖
    if(barChart) barChart.destroy();
    if(pieChart) pieChart.destroy();

    // 🌸 柱狀圖
    barChart = new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "婚禮預算金額 (NTD)",
                data: values,
                backgroundColor: [
                    "#ffb6c1",
                    "#ff69b4",
                    "#ff1493",
                    "#db7093",
                    "#ffc0cb"
                ],
                borderRadius: 8
            }]
        },
        options:{
            responsive:true,
            animation:{
                duration:1200
            },
            plugins:{
                title:{
                    display:true,
                    text:"💍 婚禮預算分析柱狀圖",
                    font:{size:18}
                },
                tooltip:{
                    callbacks:{
                        label:function(context){
                            return " NT$ " + context.raw.toLocaleString();
                        }
                    }
                }
            },
            scales:{
                y:{
                    ticks:{
                        callback:function(value){
                            return value.toLocaleString();
                        }
                    }
                }
            }
        }
    });

    // 🎀 圓餅圖
    pieChart = new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor:[
                    "#ffb6c1",
                    "#ff69b4",
                    "#ff1493",
                    "#db7093",
                    "#ffc0cb"
                ]
            }]
        },
        options:{
            animation:{
                animateRotate:true,
                duration:1200
            },
            plugins:{
                title:{
                    display:true,
                    text:"🎀 婚禮預算比例圓餅圖",
                    font:{size:18}
                },
                tooltip:{
                    callbacks:{
                        label:function(context){
                            let value=context.raw;
                            let percent=((value/total)*100).toFixed(1);
                            return ` NT$ ${value.toLocaleString()} (${percent}%)`;
                        }
                    }
                }
            }
        }
    });
}

}

function generateTimeline(){
    document.getElementById("userInput").value="流程";
    sendMessage();
}

function generateBudget(){
    document.getElementById("userInput").value="預算";
    sendMessage();
}

async function saveData(){
    await fetch("/save_data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username,data:{html:messagesDiv.innerHTML}})});
    alert("已儲存 💖");
}

async function loadData(){
    const res=await fetch(`/get_data/${username}`);
    const data=await res.json();
    if(data.html){
        messagesDiv.innerHTML=data.html;
    }
}
</script>

</body>
</html>
