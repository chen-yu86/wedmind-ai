<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WedMind AI 婚禮規劃系統</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>💍 WedMind AI 婚禮規劃系統</h1>
<p>婚禮流程 | 預算分析 | 準備清單</p>
</header>

<div class="container">

<div class="card">
<h2>婚禮流程時間軸</h2>
<div id="timeline"></div>
</div>

<div class="card">
<h2>婚禮預算分析</h2>
<canvas id="budgetChart"></canvas>
<p id="totalBudget"></p>
</div>

<div class="card">
<h2>婚禮準備清單</h2>
<div class="progress">
<div id="progressBar"></div>
</div>
<p id="progressText"></p>
<table id="checklist"></table>
</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
