<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WedMind AI 婚禮助理</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f2f2f2; }
    h1 { color: #333; text-align: center; }
    #chatBox { width: 100%; max-width: 700px; margin: 20px auto; }
    #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; background: #fff; }
    .user { color: blue; margin: 5px 0; }
    .bot { color: green; margin: 5px 0; }
    table { border-collapse: collapse; margin: 5px 0; }
    table, th, td { border: 1px solid #999; padding: 5px; }
    input[type="text"] { width: 65%; padding: 8px; }
    button { padding: 8px 12px; margin-left: 5px; }
</style>
</head>
<body>

<h1>WedMind AI 婚禮助理</h1>

<div id="chatBox">
    <div id="messages"></div>
    <input type="text" id="userInput" placeholder="輸入訊息..." />
    <button onclick="sendMessage()">送出</button>
    <button onclick="generateTimeline()">生成流程</button>
    <button onclick="generateBudget()">生成預算</button>
</div>

<script>
const messagesDiv = document.getElementById("messages");

function appendMessage(sender, text) {
    const div = document.createElement("div");
    div.className = sender;
    div.innerHTML = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;
    appendMessage("user", message);
    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    });
    const data = await response.json();

    // 回覆文字
    appendMessage("bot", data.reply);

    // 流程表
    if (data.timeline) {
        appendMessage("bot", "<b>婚禮流程表 📝</b>");
        let tableHTML = "<table><tr><th>步驟</th><th>時長(小時)</th><th>建議</th></tr>";
        data.timeline.forEach(step => {
            tableHTML += `<tr><td>${step.step}</td><td>${step.duration}</td><td>${step.suggestion}</td></tr>`;
        });
        tableHTML += "</table>";
        appendMessage("bot", tableHTML);
    }

    // 預算表
    if (data.budget) {
        appendMessage("bot", "<b>婚禮預算建議 💰</b>");
        let tableHTML = "<table><tr><th>項目</th><th>金額(元)</th></tr>";
        Object.entries(data.budget).forEach(([key, value]) => {
            tableHTML += `<tr><td>${key}</td><td>${value}</td></tr>`;
        });
        tableHTML += "</table>";
        appendMessage("bot", tableHTML);
    }
}

async function generateTimeline() {
    document.getElementById("userInput").value = "流程";
    await sendMessage();
}

async function generateBudget() {
    document.getElementById("userInput").value = "預算";
    await sendMessage();
}
</script>

</body>
</html>
